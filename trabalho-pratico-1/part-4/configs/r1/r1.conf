hostname r1
!
router bgp 65001
 bgp router-id 1.1.1.1
 no bgp ebgp-requires-policy
 neighbor 10.0.0.2 remote-as 65002
 neighbor 10.0.0.3 remote-as 65003
 neighbor 10.0.0.4 remote-as 65004
!
 address-family ipv4 unicast
  network 192.168.1.0/24
  neighbor 10.0.0.2 route-map PERMIT_ALL in
  neighbor 10.0.0.2 route-map PERMIT_ALL out
  neighbor 10.0.0.3 route-map PERMIT_ALL in
  neighbor 10.0.0.3 route-map PERMIT_ALL out
  neighbor 10.0.0.4 route-map PERMIT_ALL in
  neighbor 10.0.0.4 route-map PERMIT_ALL out
 exit-address-family
!
route-map PERMIT_ALL permit 10
!
line vty
!